[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --verbose
    --color=yes
markers =
    unit: Unit tests (no I/O)
    integration: Integration tests (file I/O, DB)
    e2e: End-to-end tests (network)
    network: Tests that make real network calls
